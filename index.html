<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wide Multi-Gesture Radium Canvas</title>
<style>
  :root{
    --bg:#080808;
    --glass:#0d0d10cc;
    --glass-border:#2a2a2e;
    --accent:#39FF14;
    --text:#e8e8ef;
    --muted:#9aa0a6;
    --danger:#ff3355;
  }
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    height:100%;
    overflow:hidden;
  }
  .wrap{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stage{
    position:relative;
    width:1024px;
    height:768px;
    border-radius:18px;
    background: #0a0a0a;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 0 1px #141418;
    overflow:hidden;
  }
  /* mirrored layer container to keep both video and canvas aligned */
  .mirrorStack{
    position:absolute;
    inset:0;
    transform: scaleX(-1);
    transform-origin:center;
  }
  video#webcam{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.65;
    filter: brightness(1.4) contrast(1.25) saturate(1.4);
    -webkit-filter: brightness(1.4) contrast(1.25) saturate(1.4);
    pointer-events:none;
  }
  canvas#paint, canvas#glitter{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  /* Glassmorphism control bar */
  .controls{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 14px;
    background: radial-gradient(120% 140% at 10% -20%, rgba(57,255,20,0.09), transparent 60%) , var(--glass);
    border:1px solid var(--glass-border);
    border-radius:14px;
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    z-index:10;
  }
  .group{
    display:flex;
    align-items:center;
    gap:8px;
    background: rgba(255,255,255,0.03);
    border:1px solid #1c1c21;
    border-radius:12px;
    padding:8px 10px;
  }
  .label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.3px;
  }
  input[type="color"]{
    width:38px;
    height:28px;
    border:none;
    border-radius:8px;
    background:none;
    padding:0;
    cursor:pointer;
  }
  .preset{
    display:flex;
    gap:6px;
  }
  .swatch{
    width:20px;
    height:20px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.25);
    cursor:pointer;
    box-shadow: 0 0 10px rgba(255,255,255,0.05), inset 0 0 6px rgba(0,0,0,0.5);
  }
  input[type="range"]{
    appearance:none;
    width:180px;
    height:6px;
    background: linear-gradient(90deg, #39FF14, #00FFFF, #FF00FF, #FFFF00);
    border-radius:999px;
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#111;
    border:2px solid #9df3ff;
    box-shadow: 0 0 12px #39FF14, inset 0 0 4px rgba(255,255,255,0.2);
    cursor:pointer;
  }
  button.clear{
    border:none;
    border-radius:10px;
    padding:8px 12px;
    background: linear-gradient(180deg, #1b0f12, #12080a);
    color:#ffdfe6;
    border:1px solid #341019;
    cursor:pointer;
    transition: box-shadow .2s ease, transform .05s linear, border-color .2s ease;
    text-shadow: 0 0 6px rgba(255,51,85,0.5);
  }
  button.clear:hover{
    box-shadow: 0 0 14px #ff335588, 0 0 36px #ff335544;
    border-color:#ff3355;
  }
  button.clear:active{
    transform: translateY(1px) scale(0.995);
  }
  .status{
    margin-left:6px;
    padding:8px 12px;
    border-radius:999px;
    background: rgba(255,255,255,0.06);
    border:1px solid #23232a;
    font-weight:600;
    font-size:12px;
    letter-spacing:.3px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
  }

  /* footer hint */
  .footer{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    color:#7b8088;
    font-size:12px;
    letter-spacing:.35px;
    opacity:.85;
    text-align:center;
    user-select:none;
    z-index:9;
  }
  .kbd{
    padding:2px 6px;
    border-radius:6px;
    background:#121216;
    border:1px solid #1e1e25;
    color:#bfc4cc;
  }

  /* subtle vignette */
  .stage:after{
    content:"";
    position:absolute;
    inset:-10%;
    pointer-events:none;
    background: radial-gradient(120% 80% at 50% -10%, transparent 50%, rgba(0,0,0,0.45) 100%);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage">
    <div class="controls" id="controls">
      <div class="group">
        <span class="label">Radium Palette</span>
        <input type="color" id="colorPicker" value="#39FF14" />
        <div class="preset">
          <div class="swatch" data-color="#39FF14" title="Neon Green" style="background:#39FF14; box-shadow:0 0 12px #39FF14;"></div>
          <div class="swatch" data-color="#00FFFF" title="Cyan" style="background:#00FFFF; box-shadow:0 0 12px #00FFFF;"></div>
          <div class="swatch" data-color="#FF00FF" title="Magenta" style="background:#FF00FF; box-shadow:0 0 12px #FF00FF;"></div>
          <div class="swatch" data-color="#FFFF00" title="Yellow" style="background:#FFFF00; box-shadow:0 0 12px #FFFF00;"></div>
        </div>
      </div>
      <div class="group">
        <span class="label">Brush</span>
        <input type="range" id="brushSize" min="6" max="60" value="18" />
      </div>
      <div class="group">
        <button class="clear" id="clearBtn">Clear Canvas</button>
      </div>
      <div class="status" id="status">
        <span class="dot" id="statusDot" style="color:#ffaa33;"></span>
        <span id="statusText">Loading AI...</span>
      </div>
    </div>

    <!-- Mirrored visual stack -->
    <div class="mirrorStack">
      <video id="webcam" playsinline></video>
      <canvas id="glitter" width="1024" height="768" aria-hidden="true"></canvas>
      <canvas id="paint" width="1024" height="768" aria-label="Radium Drawing Canvas"></canvas>
    </div>

    <div class="footer">
      Gestures: ☝ Draw • ✌ Laser Guide • ✋ Erase • ✊ Pause
      &nbsp;|&nbsp; Tips: keep your hand centered for steadier lines • Use the <span class="kbd">Clear Canvas</span> button to reset.
    </div>
  </div>
</div>

<!-- MediaPipe via CDN (Hands + Camera Utils) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
(function(){
  // DOM references
  const video = document.getElementById('webcam');
  const paint = document.getElementById('paint');
  const glitter = document.getElementById('glitter');
  const ctx = paint.getContext('2d');
  const gtx = glitter.getContext('2d');

  const colorPicker = document.getElementById('colorPicker');
  const brushSize = document.getElementById('brushSize');
  const clearBtn = document.getElementById('clearBtn');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  const presets = Array.from(document.querySelectorAll('.swatch'));

  const WIDTH = 1024, HEIGHT = 768;

  // State
  let drawColor = colorPicker.value;
  let size = parseInt(brushSize.value, 10) || 18;

  let mode = 'paused'; // 'draw' | 'laser' | 'erase' | 'paused'
  let ready = false;

  // Track finger for drawing continuity
  let lastX = null, lastY = null;
  let smoothing = { x: null, y: null }; // EMA smoothing
  const ALPHA = 0.35; // smoothing factor

  // Glitter particles
  const MAX_PARTICLES = 60;
  const particles = [];

  // Utilities
  function setStatus(text, color){
    statusText.textContent = text;
    statusDot.style.color = color;
    // Also tint controls accent softly
    document.documentElement.style.setProperty('--accent', color);
  }

  function hexToRgba(hex, a){
    const h = hex.replace('#','');
    const bigint = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return `rgba(${r},${g},${b},${a})`;
  }

  function lerp(a,b,t){ return a + (b - a) * t; }

  function toCanvasCoords(normX, normY){
    // MediaPipe gives normalized [0,1], already mirrored via transform scaleX(-1)
    // Since canvas is also mirrored visually, we can map directly:
    return { x: normX * WIDTH, y: normY * HEIGHT };
  }

  function resetStroke(){
    lastX = lastY = null;
    smoothing.x = smoothing.y = null;
  }

  // Initialize ambient neon diamond glitter
  function initParticles(){
    particles.length = 0;
    for(let i=0;i<MAX_PARTICLES;i++){
      particles.push({
        x: Math.random() * WIDTH,
        y: Math.random() * HEIGHT,
        s: 6 + Math.random()*10,           // size
        vx: (Math.random()-0.5) * 0.25,    // slow drift
        vy: (Math.random()-0.5) * 0.25,
        hue: [120, 180, 300, 60][Math.floor(Math.random()*4)], // green, cyan, magenta, yellow
        a: 0.15 + Math.random()*0.35,
        flickerT: Math.random() * Math.PI * 2
      });
    }
  }

  function drawDiamond(x,y,s,rot){
    gtx.save();
    gtx.translate(x,y);
    gtx.rotate(rot);
    gtx.beginPath();
    gtx.moveTo(0, -s*0.8);
    gtx.lineTo(s*0.8, 0);
    gtx.lineTo(0, s*0.8);
    gtx.lineTo(-s*0.8, 0);
    gtx.closePath();
    gtx.fill();
    gtx.restore();
  }

  function animateGlitter(){
    gtx.clearRect(0,0,WIDTH,HEIGHT);
    for(const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      // gentle wrap
      if(p.x < -20) p.x = WIDTH+20;
      if(p.x > WIDTH+20) p.x = -20;
      if(p.y < -20) p.y = HEIGHT+20;
      if(p.y > HEIGHT+20) p.y = -20;

      p.flickerT += 0.02 + Math.random()*0.01;
      const flicker = (Math.sin(p.flickerT) + 1) * 0.5; // 0..1
      const alpha = p.a * (0.65 + 0.35*flicker);
      const glow = 6 + 10 * flicker;

      gtx.save();
      gtx.globalCompositeOperation = 'screen';
      gtx.shadowBlur = glow*2;
      gtx.shadowColor = `hsla(${p.hue} 100% 60% / ${alpha})`;
      gtx.fillStyle = `hsla(${p.hue} 100% 60% / ${alpha})`;
      drawDiamond(p.x, p.y, p.s, (p.flickerT * 0.6) % (Math.PI*2));
      gtx.restore();
    }
    requestAnimationFrame(animateGlitter);
  }

  // Drawing primitives
  function drawLine(x0, y0, x1, y1){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = drawColor;
    ctx.lineWidth = size;
    ctx.shadowColor = hexToRgba(drawColor, 0.9);
    ctx.shadowBlur = Math.max(10, size*1.2);

    ctx.beginPath();
    ctx.moveTo(x0,y0);
    ctx.lineTo(x1,y1);
    ctx.stroke();
    ctx.restore();
  }

  function eraseAt(x, y){
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, size*0.75, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawLaserGuide(x, y){
    // Subtle white dashed crosshair axes intersecting at (x,y), plus short crosshair lines
    ctx.save();
    ctx.setLineDash([8,10]);
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.globalCompositeOperation = 'screen';

    // Vertical axis
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, HEIGHT);
    ctx.stroke();

    // Horizontal axis
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WIDTH, y);
    ctx.stroke();

    // Crosshair small
    ctx.setLineDash([4,6]);
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.moveTo(x-14, y);
    ctx.lineTo(x-4, y);
    ctx.moveTo(x+4, y);
    ctx.lineTo(x+14, y);
    ctx.moveTo(x, y-14);
    ctx.lineTo(x, y-4);
    ctx.moveTo(x, y+4);
    ctx.lineTo(x, y+14);
    ctx.stroke();

    ctx.restore();
  }

  function drawEraserIndicator(x, y){
    ctx.save();
    ctx.setLineDash([6,8]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255,64,64,0.85)';
    ctx.beginPath();
    ctx.arc(x, y, size*0.75, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Gesture helpers using MediaPipe landmarks
  // Landmarks index map for fingertips: 4 (thumb), 8 (index), 12 (middle), 16 (ring), 20 (pinky)
  // We'll consider a finger "extended" if tip y is less than PIP y (for a mirrored upright hand) in image coordinates.
  function isFingerExtended(landmarks, tip, pip){
    // Compare y: smaller y means higher in the image (finger raised)
    return landmarks[tip].y < landmarks[pip].y;
  }

  function detectMode(landmarks){
    const idx = isFingerExtended(landmarks, 8, 6);
    const mid = isFingerExtended(landmarks, 12, 10);
    const rng = isFingerExtended(landmarks, 16, 14);
    const pky = isFingerExtended(landmarks, 20, 18);
    const thumb = landmarks[4].x < landmarks[3].x ? false : false; // ignore thumb for simplicity, don't use it for mode

    // Modes per spec:
    // Draw: index only
    if (idx && !mid && !rng && !pky) return 'draw';
    // Laser: index + middle
    if (idx && mid && !rng && !pky) return 'laser';
    // Erase: all four
    if (idx && mid && rng && pky) return 'erase';
    // Paused: fist (none)
    if (!idx && !mid && !rng && !pky) return 'paused';
    // Default to paused for other combos
    return 'paused';
  }

  // Main result handler
  function onResults(results){
    if(!ready){
      ready = true;
      setStatus('Ready — show your hand to start', '#39FF14');
    }

    // Softly fade overlay artifacts (laser/eraser indicators) each frame
    ctx.save();
    ctx.globalCompositeOperation = 'destination-over';
    ctx.restore();

    let activeHand = null;
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      activeHand = results.multiHandLandmarks[0];
    }

    if (!activeHand){
      // No hand detected: pause and reset vectors
      if (mode !== 'paused') {
        mode = 'paused';
        setStatus('Paused — no hand detected', '#8888aa');
      }
      resetStroke();
      return;
    }

    const lm = activeHand;
    const fMode = detectMode(lm);
    if (fMode !== mode){
      mode = fMode;
      resetStroke();
      switch(mode){
        case 'draw': setStatus('Draw Mode', drawColor); break;
        case 'laser': setStatus('Laser Guide', '#ffffff'); break;
        case 'erase': setStatus('Erase Mode', '#ff3355'); break;
        case 'paused': default: setStatus('Paused', '#8888aa'); break;
      }
    }

    // Finger tip (Index 8)
    const tip = lm[8];
    // normalized -> canvas coords
    const { x: cx, y: cy } = toCanvasCoords(tip.x, tip.y);

    // Smooth coordinates
    if (smoothing.x === null){
      smoothing.x = cx;
      smoothing.y = cy;
    } else {
      smoothing.x = lerp(smoothing.x, cx, ALPHA);
      smoothing.y = lerp(smoothing.y, cy, ALPHA);
    }
    const x = smoothing.x;
    const y = smoothing.y;

    // Process per mode
    if (mode === 'draw'){
      if (lastX === null){
        lastX = x; lastY = y;
      } else {
        // Clamp movement to avoid big jumps when tracking re-acquires
        const dx = x - lastX, dy = y - lastY;
        const dist2 = dx*dx + dy*dy;
        const maxStep = Math.max(8, size*1.2);
        if (dist2 < (maxStep*maxStep*8)){ // allow some speed, but prevent teleports
          drawLine(lastX, lastY, x, y);
          lastX = x; lastY = y;
        } else {
          // jump detected, reset to avoid line across canvas
          lastX = x; lastY = y;
        }
      }
    } else if (mode === 'laser'){
      // Reset drawing vectors to avoid trailing lines
      resetStroke();
      // Draw subtle crosshair grid at finger tip
      drawLaserGuide(x, y);
    } else if (mode === 'erase'){
      // Show eraser indicator and erase using destination-out
      eraseAt(x, y);
      drawEraserIndicator(x, y);
      lastX = x; lastY = y; // not strictly needed, but keep reference
    } else {
      // paused
      resetStroke();
    }
  }

  // UI events
  colorPicker.addEventListener('input', (e)=>{
    drawColor = e.target.value;
    if (mode === 'draw') setStatus('Draw Mode', drawColor);
  });
  presets.forEach(el=>{
    el.addEventListener('click', ()=>{
      const c = el.getAttribute('data-color');
      drawColor = c;
      colorPicker.value = c;
      if (mode === 'draw') setStatus('Draw Mode', drawColor);
    });
  });
  brushSize.addEventListener('input', (e)=>{
    size = parseInt(e.target.value, 10);
  });
  clearBtn.addEventListener('click', ()=>{
    ctx.clearRect(0,0,WIDTH,HEIGHT);
  });

  // Prepare canvases
  function fitCanvases(){
    // The canvas backing store is fixed 1024x768; CSS scales it via container size (already fixed).
    paint.width = WIDTH; paint.height = HEIGHT;
    glitter.width = WIDTH; glitter.height = HEIGHT;
  }
  fitCanvases();
  initParticles();
  requestAnimationFrame(animateGlitter);

  // Initialize MediaPipe Hands
  setStatus('Loading AI...', '#ffaa33');

  if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
    console.error('MediaPipe scripts failed to load (Hands/Camera undefined).');
    setStatus('AI failed to load — check network/CDN', '#ff3355');
    return;
  }

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
  });
  hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.75,
    modelComplexity: 1
  });
  hands.onResults(onResults);

  // Camera setup via MediaPipe CameraUtils
  let camera = null;

  async function initCamera(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: WIDTH, height: HEIGHT, facingMode: 'user' },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      // Use CameraUtils for frame piping to Hands
      camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: WIDTH,
        height: HEIGHT
      });
      camera.start();
    }catch(err){
      console.error('Camera error:', err);
      setStatus('Camera blocked — allow webcam to draw', '#ff7a7a');
    }
  }

  // Kick off
  initCamera();

  // Resize observer (in case of DPI or container changes; keeps crispness)
  const ro = new ResizeObserver(()=>{
    fitCanvases();
  });
  ro.observe(document.getElementById('stage'));

  // Keyboard quick toggles (optional quality-of-life, does not change requirements)
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'c' || e.key === 'C'){
      ctx.clearRect(0,0,WIDTH,HEIGHT);
    }
  });

})();
</script>
</body>
</html>
